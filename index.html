<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 DARLEY'S 25th BIRTHDAY 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
body { 
  background: #0a0a12;
  min-height: 100vh; 
  font-family: 'Outfit', sans-serif;
  color: white;
  overflow: hidden;
}

/* ============ START SCREEN ============ */
#start {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #1a0a2e 0%, #0d0d1a 50%, #000 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#start.hidden { display: none; }
.cake { font-size: clamp(4rem, 20vw, 8rem); animation: bounce 1s infinite; filter: drop-shadow(0 0 30px #ff2d95); }
.title { font-size: clamp(2rem, 10vw, 4rem); font-weight: 900; background: linear-gradient(90deg, #ff2d95, #00d4ff, #ffd600); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
.subtitle { font-size: clamp(0.8rem, 3vw, 1.2rem); color: #00d4ff; letter-spacing: 0.3em; margin-bottom: 30px; text-transform: uppercase; }
.enterBtn {
  padding: 20px 50px;
  font-size: clamp(1rem, 4vw, 1.5rem);
  font-weight: bold;
  background: linear-gradient(135deg, #ff2d95, #ff00ff);
  border: none;
  border-radius: 50px;
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 40px rgba(255,45,149,0.5);
  animation: pulse 1.5s infinite;
}
.enterBtn:active { transform: scale(0.95); }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.8} }

/* ============ SCENES ============ */
.scene { display: none; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; z-index: 90; }
.scene.active { display: flex; }
#scene-walk { background: linear-gradient(180deg, #050510, #0a0a1a); }
.walk-emoji { font-size: clamp(4rem, 18vw, 7rem); animation: walk 0.4s infinite alternate; }
@keyframes walk { from{transform:translateX(-30px)scale(0.95)} to{transform:translateX(30px)scale(1.05)} }
.walk-txt { color: #00d4ff; font-size: clamp(1rem, 4vw, 1.5rem); margin-top: 20px; }

/* ============ ID SCENE ============ */
#scene-id { background: #020205; }
.id-card { background: linear-gradient(145deg, #151520, #0a0a15); border: 3px solid #00d4ff; border-radius: 20px; padding: 25px; width: 85%; max-width: 280px; box-shadow: 0 0 40px rgba(0,212,255,0.3); }
.id-cam { width: 70px; height: 70px; border-radius: 50%; background: #000; border: 4px solid #333; margin: 0 auto 15px; position: relative; }
.id-cam::after { content: ''; position: absolute; top: 30%; left: 30%; width: 20%; height: 20%; border-radius: 50%; background: #00d4ff; animation: blink 0.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.scan-line { height: 3px; background: linear-gradient(90deg, transparent, #00d4ff, white, #ff2d95, transparent); animation: scan 1s infinite; margin-bottom: 15px; }
@keyframes scan { 0%,100%{transform:translateY(0)} 50%{transform:translateY(80px)} }
.id-name { font-size: 1.8rem; font-weight: 900; }
.id-dob { color: #00d4ff; font-size: 0.9rem; }
.id-age { color: #00ff88; font-size: 1.3rem; font-weight: bold; margin-top: 5px; }
.id-ok { color: #00ff88; font-weight: bold; margin-top: 10px; opacity: 0; transition: 0.5s; }
.id-ok.show { opacity: 1; }

/* ============ DRUG SCAN ============ */
#scene-drug { background: linear-gradient(180deg, #0a0a15, #000); }
.drug-card { background: linear-gradient(145deg, #1a1a28, #0d0d18); border: 3px solid #ff2d95; border-radius: 25px; padding: 25px; width: 85%; max-width: 300px; box-shadow: 0 0 50px rgba(255,45,149,0.4); position: relative; overflow: hidden; }
.drug-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(255,45,149,0.3) 50%, transparent 70%); animation: scanPulse 1.5s infinite; }
@keyframes scanPulse { 0%,100%{transform:translateY(-100%)} 50%{transform:translateY(100%)} }
.drug-icon { font-size: clamp(3rem, 12vw, 5rem); animation: bounce 0.6s infinite; }
.drug-status { font-size: clamp(1.2rem, 5vw, 1.8rem); font-weight: bold; margin-top: 15px; animation: pulse 0.5s infinite; }
.drug-status.scanning { color: #ffd600; }
.drug-status.clear { color: #00ff88; }
.drug-result { margin-top: 20px; opacity: 0; transform: scale(0.5); transition: 0.5s; }
.drug-result.show { opacity: 1; transform: scale(1); }
.drug-result-emoji { font-size: clamp(3rem, 12vw, 5rem); }
.drug-result-txt { color: #00ff88; font-weight: bold; font-size: clamp(1rem, 4vw, 1.3rem); }

/* ============ COUNTDOWN ============ */
#countdown { background: rgba(0,0,0,0.95); }
.count-num { font-size: clamp(6rem, 35vw, 18rem); font-weight: 900; color: white; text-shadow: 0 0 60px #ff2d95, 0 0 120px #00d4ff; animation: pop 0.5s; }
.count-txt { color: #00d4ff; font-size: clamp(0.8rem, 3vw, 1.5rem); margin-top: 20px; letter-spacing: 0.2em; }
@keyframes pop { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

/* ============ PARTY ============ */
#party { background: #000; position: fixed; inset: 0; overflow: hidden; }
.party-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at center, #1a0030 0%, #000 100%); }
/* Disco ball */
.disco { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); font-size: clamp(2.5rem, 10vw, 4rem); animation: spin 3s linear infinite; }
/* Lights */
.lights { position: absolute; inset: 0; overflow: hidden; }
.light { position: absolute; bottom: 0; width: 80px; height: 150vh; transform-origin: bottom; filter: blur(20px); opacity: 0.6; animation: lightMove 2s ease-in-out infinite; }
.light:nth-child(1) { left: 10%; background: linear-gradient(to top, #ff2d95, transparent); animation-delay: 0s; }
.light:nth-child(2) { left: 30%; background: linear-gradient(to top, #00d4ff, transparent); animation-delay: 0.3s; }
.light:nth-child(3) { left: 50%; background: linear-gradient(to top, #ffd600, transparent); animation-delay: 0.6s; }
.light:nth-child(4) { left: 70%; background: linear-gradient(to top, #00ff88, transparent); animation-delay: 0.9s; }
.light:nth-child(5) { left: 90%; background: linear-gradient(to top, #ff00ff, transparent); animation-delay: 1.2s; }
@keyframes lightMove { 0%,100%{transform:rotate(-15deg)scaleY(1);opacity:0.5} 50%{transform:rotate(15deg)scaleY(1.3);opacity:0.8} }
@keyframes spin { from{transform:translateX(-50%)rotate(0deg)} to{transform:translateX(-50%)rotate(360deg)} }
/* Floor */
.floor { position: absolute; bottom: 0; left: -50%; right: -50%; height: 30%; background: repeating-conic-gradient(from 0deg, #111 0deg 10deg, #222 10deg 20deg); transform: perspective(500px) rotateX(60deg); animation: floorBeat 0.3s infinite; }
@keyframes floorBeat { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.5)} }
/* Stars */
.stars { position: absolute; inset: 0; }
.star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
@keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }
/* Photo */
.photo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: clamp(150px, 50vw, 250px); height: clamp(150px, 50vw, 250px); border-radius: 50%; object-fit: cover; border: 8px solid white; box-shadow: 0 0 50px #ff2d95, 0 0 80px #00d4ff; animation: photoPulse 2s infinite; display: none; }
.photo.show { display: block; }
@keyframes photoPulse { 0%,100%{transform:translate(-50%,-50%)scale(1)} 50%{transform:translate(-50%,-50%)scale(1.05)} }
/* Bday text */
.bday-text { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 900; text-align: center; color: white; text-shadow: 0 0 30px #ff2d95, 0 0 60px #00d4ff; animation: bounce 1s infinite; white-space: nowrap; display: none; }
.bday-text.show { display: block; }
/* Confetti */
.confetti-zone { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }
.confetti { position: absolute; width: 10px; height: 10px; top: -20px; animation: confettiFall 3s linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(0)rotate(0deg);opacity:1} 100%{transform:translateY(100vh)rotate(720deg);opacity:0} }
/* Tap hint */
.tap-hint { position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%); padding: 12px 25px; background: rgba(255,45,149,0.3); border: 2px solid #ff2d95; border-radius: 25px; font-size: clamp(0.8rem, 3vw, 1rem); animation: pulse 1s infinite; display: none; }
.tap-hint.show { display: block; }

/* ============ GAME ============ */
.game-btn { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); padding: 18px 45px; font-size: clamp(1rem, 4vw, 1.4rem); font-weight: bold; background: linear-gradient(135deg, #ff2d95, #00d4ff); border: none; border-radius: 50px; color: white; box-shadow: 0 10px 30px rgba(255,45,149,0.5); animation: pulse 1.5s infinite; display: none; z-index: 100; }
.game-btn.show { display: block; }
.game-hud { position: absolute; top: 15px; right: 15px; font-size: 1.3rem; font-weight: bold; color: #ffd600; text-shadow: 0 0 15px #ffd600; display: none; z-index: 100; }
.game-hud.show { display: block; }
.track { position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8)); display: none; z-index: 60; }
.track.show { display: block; }
.runner { position: absolute; bottom: 18%; left: 50%; transform: translateX(-50%); font-size: clamp(3rem, 12vw, 5rem); display: none; filter: drop-shadow(0 0 20px #00d4ff); z-index: 70; }
.runner.show { display: block; }
.runner.jump { animation: jump 0.5s ease-out; }
@keyframes jump { 0%{bottom:18%} 40%{bottom:40%} 100%{bottom:18%} }
.game-item { position: absolute; font-size: clamp(2rem, 8vw, 3.5rem); bottom: 18%; z-index: 65; animation: itemMove 2.5s linear forwards; }
@keyframes itemMove { 0%{right:-50px} 100%{right:110%} }
.game-obs { position: absolute; font-size: clamp(2rem, 8vw, 3.5rem); bottom: 18%; z-index: 65; animation: itemMove 2.5s linear forwards; }
.skip-btn { position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%); padding: 12px 30px; font-size: 0.9rem; background: linear-gradient(135deg, #00d4ff, #ff2d95); border: none; border-radius: 25px; color: white; display: none; z-index: 100; }
.skip-btn.show { display: block; }

/* ============ GAME OVER ============ */
.game-over { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
.game-over.show { display: flex; }
.game-over h1 { font-size: clamp(2rem, 10vw, 4rem); margin-bottom: 20px; }
.game-over p { font-size: 1.5rem; color: #ffd600; margin-bottom: 30px; }
.game-over button { padding: 15px 40px; font-size: 1.1rem; font-weight: bold; background: linear-gradient(135deg, #ff2d95, #00d4ff); border: none; border-radius: 40px; color: white; margin: 10px; }
.burst { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(2rem, 10vw, 4rem); font-weight: bold; color: white; text-shadow: 0 0 30px #ff2d95; animation: burst 0.6s forwards; z-index: 150; pointer-events: none; }
@keyframes burst { 0%{transform:translate(-50%,-50%)scale(0);opacity:1} 50%{transform:translate(-50%,-50%)scale(1.5)} 100%{transform:translate(-50%,-50%)scale(2);opacity:0} }
.flash { position: fixed; inset: 0; background: white; animation: flash 0.1s forwards; z-index: 140; pointer-events: none; }
@keyframes flash { 0%{opacity:0.5} 100%{opacity:0} }
</style>
</head>
<body>

<!-- START -->
<div id="start">
  <div class="cake">🎂</div>
  <div class="title">CLUB 25</div>
  <div class="subtitle">DARLEY'S BIRTHDAY</div>
  <button class="enterBtn" id="enterBtn">👆 TAP TO ENTER 👆</button>
</div>

<!-- WALK -->
<div id="scene-walk" class="scene">
  <div class="walk-emoji">🚶‍♀️</div>
  <div class="walk-txt">Walking to the club...</div>
</div>

<!-- ID -->
<div id="scene-id" class="scene">
  <div class="id-card">
    <div class="id-cam"></div>
    <div class="scan-line"></div>
    <div class="id-name">DARLEY</div>
    <div class="id-dob">DOB: 03/15/2001</div>
    <div class="id-age">AGE: 25</div>
    <div class="id-ok" id="idOk">✓ VERIFIED - 25+</div>
  </div>
</div>

<!-- DRUG SCAN -->
<div id="scene-drug" class="scene">
  <div class="drug-card">
    <div class="drug-icon">🐕</div>
    <div class="drug-status scanning" id="drugStatus">SCANNING...</div>
    <div class="drug-result" id="drugResult">
      <div class="drug-result-emoji">✅</div>
      <div class="drug-result-txt">ALL CLEAR!</div>
    </div>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="countdown" class="scene">
  <div class="count-num" id="countNum">3</div>
  <div class="count-txt">LET'S GET THIS PARTY STARTED!</div>
</div>

<!-- PARTY -->
<div id="party">
  <div class="party-bg"></div>
  <div class="lights">
    <div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div><div class="light"></div>
  </div>
  <div class="disco">🪩</div>
  <div class="stars" id="stars"></div>
  <div class="floor"></div>
  <img src="darley-photo.jpg" class="photo" id="photo" alt="Happy Birthday Darley!">
  <div class="bday-text" id="bdayText">🎉 HAPPY 25TH BIRTHDAY DARLEY! 🎉</div>
  <div class="confetti-zone" id="confettiZone"></div>
  <div class="tap-hint" id="tapHint">👆 TAP ANYWHERE FOR EFFECTS! 👆</div>
  
  <button class="game-btn" id="gameBtn">🎮 TAP TO PLAY! 🎮</button>
  <div class="game-hud" id="gameHud">SCORE: <span id="score">0</span></div>
  <div class="track" id="track"></div>
  <div class="runner" id="runner">🕺</div>
  <button class="skip-btn" id="skipBtn">🎉 JUST PARTY!</button>
</div>

<!-- GAME OVER -->
<div class="game-over" id="gameOver">
  <h1>🎮 GAME OVER!</h1>
  <p>Final Score: <span id="finalScore">0</span></p>
  <button id="playAgainBtn">🔄 PLAY AGAIN</button>
  <button id="justPartyBtn">🎉 JUST PARTY!</button>
</div>

<script>
// ============ GAME STATE ============
let gameOn = false;
let score = 0;
let gameItems = [];
let gameObs = [];

// ============ INIT ============
document.addEventListener('DOMContentLoaded', function() {
  // Create stars
  for(let i = 0; i < 40; i++) {
    let s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 80 + '%';
    s.style.animationDelay = Math.random() * 2 + 's';
    document.getElementById('stars').appendChild(s);
  }
});

// ============ ENTER FLOW ============
document.getElementById('enterBtn').addEventListener('click', startFlow);
document.getElementById('enterBtn').addEventListener('touchstart', function(e) { e.preventDefault(); startFlow(); });
document.getElementById('start').addEventListener('click', startFlow);

function startFlow() {
  document.getElementById('start').classList.add('hidden');
  document.getElementById('scene-walk').classList.add('active');
  
  setTimeout(function() {
    document.getElementById('scene-walk').classList.remove('active');
    document.getElementById('scene-id').classList.add('active');
    
    setTimeout(function() {
      document.getElementById('idOk').classList.add('show');
      
      setTimeout(function() {
        document.getElementById('scene-id').classList.remove('active');
        startDrugScan();
      }, 1800);
    }, 1500);
  }, 2500);
}

// ============ DRUG SCAN ============
function startDrugScan() {
  document.getElementById('scene-drug').classList.add('active');
  const statuses = ['SCANNING...', 'ANALYZING...', 'CHECKING...', 'ALMOST DONE...'];
  let idx = 0;
  let interval = setInterval(function() {
    if(idx < statuses.length) {
      document.getElementById('drugStatus').textContent = statuses[idx];
      idx++;
    }
  }, 700);
  
  setTimeout(function() {
    clearInterval(interval);
    document.getElementById('drugStatus').textContent = 'ALL CLEAR!';
    document.getElementById('drugStatus').className = 'drug-status clear';
    document.getElementById('drugResult').classList.add('show');
    triggerFlash();
    
    setTimeout(function() {
      document.getElementById('scene-drug').classList.remove('active');
      startCountdown();
    }, 2000);
  }, 3200);
}

// ============ COUNTDOWN ============
function startCountdown() {
  document.getElementById('countdown').classList.add('active');
  let n = 3;
  let interval = setInterval(function() {
    document.getElementById('countNum').textContent = n > 0 ? n : '🎉';
    document.getElementById('countNum').style.animation = 'none';
    document.getElementById('countNum').offsetHeight;
    document.getElementById('countNum').style.animation = 'pop 0.5s';
    if(navigator.vibrate) navigator.vibrate(50);
    if(n === 0) {
      clearInterval(interval);
      document.getElementById('countdown').classList.remove('active');
      startParty();
    }
    n--;
  }, 1000);
}

// ============ PARTY ============
function startParty() {
  document.getElementById('photo').classList.add('show');
  document.getElementById('bdayText').classList.add('show');
  document.getElementById('tapHint').classList.add('show');
  
  // Confetti
  setInterval(function() { spawnConfetti(6); }, 1500);
  
  // Show game button
  setTimeout(function() {
    document.getElementById('gameBtn').classList.add('show');
  }, 5000);
}

function spawnConfetti(amt) {
  const colors = ['#ff2d95', '#00d4ff', '#ffd600', '#00ff88', '#ff00ff'];
  for(let i = 0; i < amt; i++) {
    setTimeout(function() {
      let c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + '%';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2 + Math.random()) + 's';
      document.getElementById('confettiZone').appendChild(c);
      setTimeout(function() { c.remove(); }, 4000);
    }, i * 50);
  }
}

function triggerFlash() {
  let f = document.createElement('div');
  f.className = 'flash';
  document.body.appendChild(f);
  setTimeout(function() { f.remove(); }, 100);
  if(navigator.vibrate) navigator.vibrate(50);
}

// ============ GAME ============
document.getElementById('gameBtn').addEventListener('click', function() {
  document.getElementById('gameBtn').classList.remove('show');
  document.getElementById('tapHint').classList.remove('show');
  startGame();
});
document.getElementById('gameBtn').addEventListener('touchstart', function(e) {
  e.preventDefault();
  document.getElementById('gameBtn').classList.remove('show');
  startGame();
});

function startGame() {
  gameOn = true;
  score = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('gameHud').classList.add('show');
  document.getElementById('track').classList.add('show');
  document.getElementById('runner').classList.add('show');
  document.getElementById('skipBtn').classList.add('show');
  
  spawnItem();
  spawnObstacle();
  moveItems();
}

function spawnItem() {
  if(!gameOn) return;
  let it = document.createElement('div');
  it.className = 'game-item';
  it.textContent = ['💰', '💵', '🎂', '🎁', '🔥', '⭐', '💎', '🎉'][Math.floor(Math.random() * 8)];
  it.style.left = (10 + Math.random() * 80) + '%';
  document.body.appendChild(it);
  gameItems.push(it);
  setTimeout(spawnItem, 700);
}

function spawnObstacle() {
  if(!gameOn) return;
  let ob = document.createElement('div');
  ob.className = 'game-obs';
  ob.textContent = ['🚧', '🪨', '👮'][Math.floor(Math.random() * 3)];
  ob.style.left = (10 + Math.random() * 80) + '%';
  document.body.appendChild(ob);
  gameObs.push(ob);
  setTimeout(spawnObstacle, 1100);
}

function moveItems() {
  if(!gameOn) return;
  let r = document.getElementById('runner').getBoundingClientRect();
  
  gameItems.forEach(function(it, idx) {
    let ir = it.getBoundingClientRect();
    if(isColliding(r, ir)) {
      let pts = {'💰':100, '💵':80, '🎂':50, '🎁':50, '🔥':40, '⭐':60, '💎':70, '🎉':30};
      score += pts[it.textContent] || 50;
      document.getElementById('score').textContent = score;
      showBurst('+' + (pts[it.textContent] || 50));
      triggerFlash();
      it.remove();
      gameItems.splice(idx, 1);
    }
  });
  
  gameObs.forEach(function(ob, idx) {
    let obr = ob.getBoundingClientRect();
    if(isColliding(r, obr)) {
      endGame();
    }
  });
  
  gameItems = gameItems.filter(it => it.getBoundingClientRect().right > 0);
  gameObs = gameObs.filter(ob => ob.getBoundingClientRect().right > 0);
  
  setTimeout(moveItems, 25);
}

function isColliding(a, b) {
  return !(a.right < b.left + 20 || a.left > b.right - 20 || a.bottom < b.top + 20 || a.top > b.bottom - 20);
}

function doJump() {
  if(!gameOn) return;
  let r = document.getElementById('runner');
  r.classList.add('jump');
  if(navigator.vibrate) navigator.vibrate(20);
  setTimeout(function() { r.classList.remove('jump'); }, 500);
}

function showBurst(text) {
  let b = document.createElement('div');
  b.className = 'burst';
  b.textContent = text;
  document.body.appendChild(b);
  setTimeout(function() { b.remove(); }, 600);
}

function endGame() {
  gameOn = false;
  gameItems.forEach(t => t.remove());
  gameObs.forEach(t => t.remove());
  gameItems = [];
  gameObs = [];
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').classList.add('show');
  triggerFlash();
  if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
}

function restartGame() {
  document.getElementById('gameOver').classList.remove('show');
  gameItems.forEach(t => t.remove());
  gameObs.forEach(t => t.remove());
  gameItems = [];
  gameObs = [];
  startGame();
}

function skipGame() {
  gameOn = false;
  gameItems.forEach(t => t.remove());
  gameObs.forEach(t => t.remove());
  gameItems = [];
  gameObs = [];
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('gameHud').classList.remove('show');
  document.getElementById('track').classList.remove('show');
  document.getElementById('runner').classList.remove('show');
  document.getElementById('skipBtn').classList.remove('show');
  document.getElementById('tapHint').classList.add('show');
}

document.getElementById('playAgainBtn').addEventListener('click', restartGame);
document.getElementById('justPartyBtn').addEventListener('click', skipGame);
document.getElementById('skipBtn').addEventListener('click', skipGame);

// ============ CONTROLS ============
function handleTap(e) {
  if(gameOn) {
    e.preventDefault();
    doJump();
  }
}
document.addEventListener('click', handleTap);
document.addEventListener('touchstart', handleTap, {passive: false});

function handlePartyTap(e) {
  if(gameOn) return;
  if(!document.getElementById('photo').classList.contains('show')) return;
  e.preventDefault();
  triggerFlash();
  spawnConfetti(5);
}
document.getElementById('party').addEventListener('click', handlePartyTap);
document.getElementById('party').addEventListener('touchstart', handlePartyTap, {passive: false});
</script>
</body>
</html>
