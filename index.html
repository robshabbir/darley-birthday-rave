<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 DARLEY'S 25th BIRTHDAY 🎂</title>
<style>
* { margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { 
  background: linear-gradient(135deg, #1a0a2e 0%, #0d0d1a 50%, #000 100%);
  min-height: 100vh; 
  display: flex; 
  flex-direction: column;
  align-items: center; 
  justify-content: center;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  text-align: center;
  touch-action: manipulation;
}
h1 { font-size: clamp(2rem, 10vw, 4rem); margin: 20px 0; }
p { font-size: clamp(1rem, 4vw, 1.5rem); color: #00d4ff; letter-spacing: 0.2em; margin-bottom: 40px; text-transform: uppercase;}
#enterBtn {
  padding: 25px 60px;
  font-size: clamp(1.2rem, 5vw, 1.8rem);
  font-weight: bold;
  background: linear-gradient(135deg, #ff2d95, #ff00ff);
  border: none;
  border-radius: 60px;
  color: white;
  cursor: pointer;
  box-shadow: 0 10px 50px rgba(255,45,149,0.6);
  transition: transform 0.1s;
}
#enterBtn:active { transform: scale(0.95); }
#scene-walk, #scene-id, #scene-drug, #countdown, #party { display: none; width: 100%; height: 100%; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; }
#scene-walk { background: linear-gradient(180deg, #050510, #0a0a1a); }
#scene-id { background: #020205; }
#scene-drug { background: linear-gradient(180deg, #0a0a15, #000); }
#countdown { background: rgba(0,0,0,0.95); }
#party { background: #000; position: fixed; inset: 0; }
.show { display: flex !important; }
.id-card { background: linear-gradient(145deg, #151520, #0a0a15); border: 3px solid #00d4ff; border-radius: 20px; padding: 30px; width: 80%; max-width: 280px; }
.drug-card { background: linear-gradient(145deg, #1a1a28, #0d0d18); border: 3px solid #ff2d95; border-radius: 25px; padding: 30px; width: 80%; max-width: 300px; }
.count-num { font-size: clamp(8rem, 40vw, 20rem); font-weight: bold; color: white; text-shadow: 0 0 60px #ff2d95; }
.emoji { font-size: 4rem; animation: bounce 0.5s infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
</style>
</head>
<body>

<!-- START -->
<div id="start">
  <h1>🎂 CLUB 25 🎂</h1>
  <p>DARLEY'S BIRTHDAY</p>
  <button id="enterBtn">👆 TAP TO ENTER 👆</button>
</div>

<!-- WALK -->
<div id="scene-walk">
  <div class="emoji">🚶‍♀️</div>
  <p style="margin-top:20px">Walking to the club...</p>
</div>

<!-- ID -->
<div id="scene-id">
  <div class="id-card">
    <div class="emoji">📷</div>
    <h2 style="margin:15px 0 5px">DARLEY</h2>
    <p style="margin-bottom:5px">DOB: 03/15/2001</p>
    <p style="color:#00ff88;font-size:1.5rem;font-weight:bold">AGE: 25 ✓</p>
  </div>
</div>

<!-- DRUG SCAN -->
<div id="scene-drug">
  <div class="drug-card">
    <div class="emoji">🐕</div>
    <p style="margin-top:15px;color:#00ff88;font-weight:bold">ALL CLEAR!</p>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="countdown">
  <div class="count-num" id="countNum">3</div>
  <p style="margin-top:20px">LET'S GET THIS PARTY STARTED!</p>
</div>

<!-- PARTY -->
<div id="party">
  <h1>🎉 HAPPY 25TH BIRTHDAY DARLEY! 🎉</h1>
  <p style="margin-top:20px">Tap anywhere for confetti! 🎊</p>
</div>

<script>
// DEBUG: Check if script runs
alert('JS Working!');
console.log('JS LOADED');

var step = 0;
function go() {
  console.log('GO FUNCTION CALLED');
  
  // Hide start, show walk
  document.getElementById('start').style.display = 'none';
  document.getElementById('scene-walk').classList.add('show');
  
  setTimeout(function() {
    document.getElementById('scene-walk').classList.remove('show');
    document.getElementById('scene-id').classList.add('show');
    
    setTimeout(function() {
      document.getElementById('scene-id').classList.remove('show');
      document.getElementById('scene-drug').classList.add('show');
      
      setTimeout(function() {
        document.getElementById('scene-drug').classList.remove('show');
        document.getElementById('countdown').classList.add('show');
        
        var n = 3;
        var timer = setInterval(function() {
          document.getElementById('countNum').textContent = n > 0 ? n : '🎉';
          if(n === 0) {
            clearInterval(timer);
            document.getElementById('countdown').classList.remove('show');
            document.getElementById('party').classList.add('show');
          }
          n--;
        }, 1000);
        
      }, 2000);
    }, 2000);
  }, 3000);
}

// Attach to button
var btn = document.getElementById('enterBtn');
btn.addEventListener('click', go);
btn.addEventListener('touchstart', function(e) { e.preventDefault(); go(); });

// Also whole screen
document.getElementById('start').addEventListener('click', go);
document.getElementById('start').addEventListener('touchstart', function(e) { e.preventDefault(); go(); });

</script>
</body>
</html>
